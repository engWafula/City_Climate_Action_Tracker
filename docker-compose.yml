services:
  app:
    build: .
    container_name: oef-climate-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://oef:oef@postgres:5432/oef_climate?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      AUTH_SECRET: ${AUTH_SECRET:-development-auth-secret}
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "npm install
      && npm run db:generate
      && npm run db:push:accept-data-loss
      && npm run db:seed
      && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - next-cache:/app/.next

  postgres:
    image: postgres:16-alpine
    container_name: oef-climate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oef
      POSTGRES_PASSWORD: oef
      POSTGRES_DB: oef_climate
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oef -d oef_climate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  node-modules:
  next-cache:
